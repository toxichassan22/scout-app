<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Pixel Robot Settings</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }
    body {
      width: 280px;
      padding: 16px;
      background: #0f172a;
      color: #f8fafc;
    }
    .header {
      display: flex;
      items-center: center;
      gap: 10px;
      padding-bottom: 12px;
      border-bottom: 1px solid #1e293b;
      margin-bottom: 14px;
    }
    .header h1 {
      font-size: 15px;
      font-weight: 800;
      color: #38bdf8;
      letter-spacing: 0.5px;
    }
    .header span {
      font-size: 20px;
    }
    .setting-group {
      margin-bottom: 14px;
    }
    label {
      display: block;
      font-size: 11px;
      font-weight: 700;
      color: #94a3b8;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 6px;
    }
    .toggle-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: #1e293b;
      padding: 10px 12px;
      border-radius: 10px;
      border: 1px solid #334155;
    }
    .toggle-row span {
      font-size: 13px;
      font-weight: 600;
    }
    .switch {
      position: relative;
      display: inline-block;
      width: 42px;
      height: 22px;
    }
    .switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }
    .slider {
      position: absolute;
      cursor: pointer;
      inset: 0;
      background-color: #475569;
      transition: .3s;
      border-radius: 20px;
    }
    .slider:before {
      position: absolute;
      content: "";
      height: 16px;
      width: 16px;
      left: 3px;
      bottom: 3px;
      background-color: white;
      transition: .3s;
      border-radius: 50%;
    }
    input:checked + .slider {
      background-color: #0284c7;
    }
    input:checked + .slider:before {
      transform: translateX(20px);
    }
    select {
      width: 100%;
      padding: 8px 10px;
      background: #1e293b;
      color: white;
      border: 1px solid #334155;
      border-radius: 8px;
      font-size: 13px;
      outline: none;
    }
    .footer {
      text-align: center;
      margin-top: 16px;
      font-size: 10px;
      color: #64748b;
      font-weight: 600;
    }
  </style>
</head>
<body>

  <div class="header">
    <span>🤖</span>
    <div>
      <h1>PIXEL ROBOT</h1>
      <p style="font-size:10px; color:#64748b;">Mouse Follower Companion</p>
    </div>
  </div>

  <div class="setting-group">
    <div class="toggle-row">
      <span>Enable Robot</span>
      <label class="switch">
        <input type="checkbox" id="toggleRobot" checked>
        <span class="slider"></span>
      </label>
    </div>
  </div>

  <div class="setting-group">
    <label for="selectSpeed">Movement Speed</label>
    <select id="selectSpeed">
      <option value="0.04">Slow & Smooth</option>
      <option value="0.08" selected>Normal</option>
      <option value="0.16">Turbo Speed</option>
    </select>
  </div>

  <div class="setting-group">
    <label for="selectTrail">Particle Trail Theme</label>
    <select id="selectTrail">
      <option value="cyan" selected>Cyan Laser Sparks ⚡</option>
      <option value="ember">Ember Bonfire Flames 🔥</option>
      <option value="rainbow">Rainbow Magic Sparks 🌈</option>
    </select>
  </div>

  <div class="footer">
    MANIFEST V3 COMPLIANT • PURE CANVAS
  </div>

  <script src="popup.js"></script>
</body>
</html>
